name: Godot Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Run Focused GUT Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: barichello/godot-ci:4.6
      options: --user root

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Import project resources
        run: godot --path . --headless --import

      - name: Run focused gameplay regression tests headless
        run: |
          godot --path . --headless -s addons/gut/gut_cmdln.gd -gtest=res://tests/unit/test_discovery_editor_runtime_data.gd -gexit
          godot --path . --headless -s addons/gut/gut_cmdln.gd -gtest=res://tests/unit/seeds/test_ritual_recipe_catalog.gd -gexit
          godot --path . --headless -s addons/gut/gut_cmdln.gd -gtest=res://tests/unit/seeds/test_ritual_menu_slots.gd -gexit
          godot --path . --headless -s addons/gut/gut_cmdln.gd -gtest=res://tests/unit/test_biome_material_harvesting.gd -gexit
          godot --path . --headless -s addons/gut/gut_cmdln.gd -gtest=res://tests/unit/test_ritual_menu_ui.gd -gexit
          godot --path . --headless -s addons/gut/gut_cmdln.gd -gtest=res://tests/unit/test_first_expansion_loop.gd -gexit
