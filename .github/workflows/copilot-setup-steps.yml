name: Copilot setup steps

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - name: Install Headroom MCP tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install "headroom-ai[all]"
          headroom mcp status || true
