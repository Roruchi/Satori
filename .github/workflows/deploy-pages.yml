name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  export-web:
    name: Web Export
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: barichello/godot-ci:4.6
      options: --user root

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates
          cp -r /root/.local/share/godot/export_templates/4.6.stable ~/.local/share/godot/export_templates/4.6.stable

      - name: Import project resources
        run: godot --path . --headless --audio-driver Dummy --import --quit

      - name: Export game to Web
        run: |
          mkdir -v -p build/web
          godot --path . --headless --audio-driver Dummy --verbose --export-release "Web" build/web/index.html
          grep -a -q "Friendly Name,Type,Ritual ID" build/web/index.pck
          grep -a -q "ritual_fu" build/web/index.pck
          grep -a -q "form_warm_hollow" build/web/index.pck
          touch build/web/.nojekyll

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/web

      - name: Upload web smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: satori-web-export
          path: build/web

  browser-smoke:
    name: Browser Smoke
    needs: export-web
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download web export
        uses: actions/download-artifact@v4
        with:
          name: satori-web-export
          path: build/web

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install browser test dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        run: npm run test:web

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: browser-smoke
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
