<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Satori Discovery Catalog</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Satori</p>
          <h1>Discovery Catalog</h1>
        </div>
        <div class="actions">
          <label class="file-loader">
            <input id="file-input" type="file" accept=".csv" multiple>
            Load CSV
          </label>
          <button id="refresh-button" type="button">Refresh</button>
        </div>
      </header>

      <section class="toolbar" aria-label="Catalog controls">
        <nav id="dataset-tabs" class="tabs" aria-label="Datasets"></nav>
        <label class="search-box">
          <span>Search</span>
          <input id="search-input" type="search" autocomplete="off">
        </label>
        <div id="filter-slot" class="filter-slot"></div>
      </section>

      <section id="summary" class="summary-grid" aria-label="Dataset summary"></section>

      <section class="workspace">
        <div class="table-pane">
          <div class="table-wrap">
            <table>
              <thead id="table-head"></thead>
              <tbody id="table-body"></tbody>
            </table>
          </div>
        </div>
        <aside id="detail-panel" class="detail-panel" aria-label="Selected row"></aside>
      </section>

      <div id="status" class="status" role="status"></div>
    </main>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
